name: CI

on:
  push:
  pull_request:

jobs:
  # ── Python: lint + syntax checks ─────────────────────────────────────────
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools only
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Black (format check)
        run: black --check backend scraper

      - name: Flake8 (syntax + style)
        run: flake8 backend scraper

  # ── Python: build backend + run tests ────────────────────────────────────
  python-test:
    runs-on: ubuntu-latest
    needs: python-lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bearings_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:7
        ports: ["27017:27017"]

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bearings_test
      REDIS_URL: redis://localhost:6379/0
      MONGO_URL: mongodb://localhost:27017
      SECRET_KEY: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies (no heavy scrapy/playwright)
        run: |
          python -m pip install --upgrade pip
          # Install only what the backend app needs, skip scrapy-playwright
          pip install \
            aiosqlite asyncpg "celery[redis]" fastapi httpx motor orjson \
            prometheus-client "psycopg[binary]" pydantic-settings sse-starlette \
            structlog tenacity "uvicorn[standard]" python-slugify sqlalchemy \
            pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: pytest --tb=short -q

  # ── Frontend: type-check + build ─────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        run: npx vite build

  # ── Docker: build all images ──────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [python-lint, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t bearing-monitor-api --target backend .

      - name: Build worker image
        run: docker build -t bearing-monitor-worker --target worker .

      - name: Build scraper image
        run: docker build -t bearing-monitor-scraper --target scraper .

      - name: Build frontend image
        run: docker build -t bearing-monitor-frontend ./frontend
