services:
  api:
    build:
      context: .
      target: backend
    env_file: .env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"  # only accessible via nginx, not public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # worker + beat merged into one process to save ~150MB RAM
  worker:
    build:
      context: .
      target: worker
    command: >
      celery -A backend.app.celery_app.celery_app worker
      --beat
      --loglevel=warning
      --concurrency=1
      --max-memory-per-child=400000
    env_file: .env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
